{% extends "base.html" %}
{% load i18n %}

{% block actions %}

    <a href="{% url 'admin:new_user' %}" class="btn btn-green-admin">
      <i class="bi bi-person-add"></i>
      {% translate "New user" %}
    </a>
{% endblock %}


{% block content %}
  <h3>{{ subtitle }}</h3>


<div class="row">
  <div class="col">
    <table class="table">
      <thead>
	<tr>
	  <th scope="col">Email</th>
	  <th>is Admin</th>
	  <th></th>
	  <th></th>
	</tr>
      </thead>
      <tbody>
	<tr>
        {% for u in users %}
          <td>{{ u.email }}</td>
          <td>{{ u.is_admin }}</td>
          <td><a href="{% url 'admin:edit_user' u.pk %}"><i class="bi bi-eye"></i></td>
          <td><a href="{% url 'admin:delete_user' u.pk %}" class="text-danger" title="Remove"><i class="bi bi-trash"></i></td>
	</tr>
	{% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
