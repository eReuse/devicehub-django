{% load i18n %}
<button type="button" class="btn btn-sm btn-outline-danger d-flex align-items-center"
        data-bs-toggle="modal" data-bs-target="#deallocateModal{{ record.device_id }}">
  <i class="bi bi-trash me-1"></i>{% trans 'Deallocate' %}
</button>
<div class="modal fade" id="deallocateModal{{ record.device_id }}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{% trans "Deallocate Device" %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"
                aria-label="{% trans 'Close' %}"></button>
      </div>
      <div class="modal-body">
        <p>{% blocktrans with shortid=record.shortid %}Are you sure you want to deallocate device <strong>{{ shortid }}</strong>?{% endblocktrans %}</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary"
                data-bs-dismiss="modal">{% trans "Cancel" %}</button>
        <a class="btn btn-danger"
           href="{% url 'lot:del_device_beneficiary' record.lot_id record.beneficiary_id record.device_id %}">
          {% trans 'Deallocate' %}
        </a>
      </div>
    </div>
  </div>
</div>
