{% load i18n %}
{% if device_beneficiary and is_shop %}
<div class="tab-pane fade" id="beneficiary">
  <div class="row mt-3">
    <div class="col">
      <form method="post"
            action="{% url 'lot:devices_beneficiary' lot.id beneficiary.id %}">
        {% csrf_token %}
        {{ form.management_form }}
        <input type="hidden" name="next" value="{% url 'device:details' object.id %}#beneficiary">
        {% include 'beneficiary_devices_table.html' with device_context=True %}
        <div class="d-flex gap-2 align-items-center mt-2">
          <button type="submit" class="btn btn-green-admin">
            {% trans 'Save' %}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endif %}
