{% load i18n %}
{% load range %}

<div class="d-flex justify-content-between align-items-center rounded-bottom">
  <nav aria-label="Table navigation">
    <ul class="pagination mb-0">

      {% if page_number > 1 %}
      <li class="page-item">
        <a class="page-link rounded px-3 py-2"
           href="?page={{ page_number|add:-1 }}&limit={{ limit }}{% if search %}&search={{ search }}{% endif %}"
           aria-label="Previous">
          <i class="bi bi-chevron-left"></i>
        </a>
      </li>
      {% endif %}

      {% if total_pages > 1 %}
        {% for p in total_pages|range_filter:page_number %}
        <li class="page-item {% if p == page_number %}active{% endif %}">
          <a class="page-link rounded px-3 py-2 {% if p == page_number %}fw-bold{% endif %}"
             {% if p == page_number or p == "..." %}
               href="#"
             {% else %}
               href="?page={{ p }}&limit={{ limit }}{% if search %}&search={{ search }}{% endif %}"
             {% endif %}>
            {{ p }}
          </a>
        </li>
        {% endfor %}
      {% endif %}

      {% if page_number < total_pages %}
      <li class="page-item">
        <a class="page-link rounded px-3 py-2"
           href="?page={{ page_number|add:+1 }}&limit={{ limit }}{% if search %}&search={{ search }}{% endif %}"
           aria-label="Next">
          <i class="bi bi-chevron-right"></i>
        </a>
      </li>
      {% endif %}

    </ul>
  </nav>
</div>
